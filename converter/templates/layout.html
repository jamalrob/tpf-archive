<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {robot_block}
    <title>{title} - The Philosophy Forum Archive</title>
    <link rel="canonical" href="{canonical_url}">
    <meta property="og:url" content="{canonical_url}">
    <meta property="og:type" content="website">
    <meta property="og:title" content="{title} - The Philosophy Forum Archive">
    <meta property="og:description" content="A searchable archive of The Philosophy Forum (2015–2026).">
    <meta property="og:image" content="https://archive.thephilosophyforum.com/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png">
    <link rel="stylesheet" href="/assets/css/style.css?v={cssversion}">
    <script>window.BUILD_VERSION="{buildversion}";</script>
    <meta name="google-site-verification" content="Cfeefjp-d2BiuWwdA9LTdKV0B_HFPhvtQTR7QcdlIxU" />
    {extrahead}
</head>
<body>
    {header}

    <div class="tpf-archive-banner">
        <div class="tpf-archive-banner__text">
            <strong>You are viewing the historical archive of The Philosophy Forum.</strong><br>
            For current discussions, visit the live forum.
        </div>

        <a class="tpf-archive-banner__button"
            href="https://www.thephilosophyforum.com/"
            role="button">
            Go to live forum
        </a>
    </div>

    {main}
    {footer}
    {extrafoot}
</body>
</html>
